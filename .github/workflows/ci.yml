name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw verify
        # mvn verify = compile + teste unitario + integration test (Testcontainers sobe MongoDB)

  deploy:
    name: Deploy to Render
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        run: curl -fsSX POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # configurar RENDER_DEPLOY_HOOK_URL nos Secrets do repo GitHub
